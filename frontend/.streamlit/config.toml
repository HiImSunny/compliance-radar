[theme]
base = "light"

# Background: off-white with blue-gray tint
backgroundColor = "#f5f6f8"

# Sidebar: dark navy for contrast
secondaryBackgroundColor = "#1e2330"

# Primary text: near-black with blue tint
textColor = "#1a1d26"

# Primary accent: medium blue (maps to oklch(42% 0.16 250))
primaryColor = "#3d5a99"

# Font
font = "sans serif"
